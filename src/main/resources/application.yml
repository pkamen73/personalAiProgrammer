server:
  port: 8080

spring:
  application:
    name: ai-ide-assistant
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:h2:file:./data/ai-ide-assistant
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
workspace:
  root-path: .

logging:
  level:
    de.itsourcerer.aiideassistant: DEBUG
    org.springframework.web: INFO
